services:
  swarm:
    build: .
    image: hermes-swarm:latest
    env_file: .env
    environment:
      # Set by the image, repeated here for clarity / override.
      SWARM_HOST: "0.0.0.0"
      SWARM_DATA_DIR: "/data"
    ports:
      # localhost-only by default. To expose on the LAN, change to "8000:8000"
      # AND set SWARM_API_KEY in .env — it guards every endpoint + the
      # WebSocket, and the dashboard prompts for the key on first load.
      - "127.0.0.1:8000:8000"
    volumes:
      - swarm-data:/data
    restart: unless-stopped
    # If your LLM endpoint runs on the host (e.g. a LiteLLM proxy on :4000),
    # reach it from the container via http://host.docker.internal:4000/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ---- Optional: run a local LiteLLM proxy alongside the swarm ----
  # Uncomment and provide a litellm config to route many providers behind one
  # OpenAI-compatible endpoint, then set SWARM_LLM_BASE_URL=http://litellm:4000/v1
  # litellm:
  #   image: ghcr.io/berriai/litellm:main-latest
  #   command: ["--config", "/app/litellm.config.yaml", "--port", "4000"]
  #   volumes:
  #     - ./litellm.config.yaml:/app/litellm.config.yaml:ro
  #   env_file: .env
  #   ports:
  #     - "127.0.0.1:4000:4000"
  #   restart: unless-stopped

volumes:
  swarm-data:
