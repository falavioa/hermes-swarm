services:
  swarm:
    build: .
    image: hermes-swarm:latest
    env_file: .env
    environment:
      # Set by the image, repeated here for clarity / override.
      SWARM_HOST: "0.0.0.0"
      SWARM_DATA_DIR: "/data"
    ports:
      # localhost-only by default. To expose on the LAN, change to "8000:8000"
      # AND set SWARM_API_KEY in .env — it guards every endpoint + the
      # WebSocket, and the dashboard prompts for the key on first load.
      - "127.0.0.1:8000:8000"
    volumes:
      - swarm-data:/data
    restart: unless-stopped
    # If you configured a custom / OpenAI-compatible endpoint that runs on the
    # HOST (via `hermes setup`), reach it from the container as
    # http://host.docker.internal:<port> instead of localhost.
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  swarm-data:
